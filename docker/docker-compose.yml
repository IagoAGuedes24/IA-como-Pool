version: '3.8'

services:
  redis:
    image: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"

  generator:
    build: ./services/generator
    depends_on:
      - rabbitmq

  consumer:
    build: ./services/consumer
    depends_on:
      - redis 
