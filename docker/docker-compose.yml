version: '3.8'

services:
  redis:
    image: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"

  generator:
    build: ../services/generator
    depends_on:
      - rabbitmq
    env_file:      
      - .env    
    environment:        
      - GROQ_API_KEY

  consumer:
    build: ../services/consumer
    depends_on:
      - redis 
    ports:
      - "8000:8000"
